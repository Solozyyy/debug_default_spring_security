spring.application.name=session

server.port=8081

# Thông tin kết nối DB
spring.datasource.url=jdbc:mysql://localhost:3306/[your_db_name]?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=your_username_in_mysql
spring.datasource.password=your_password_in_mysql

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
